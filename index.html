<!DOCTYPE html>
<html>
<head>
  <title>Cover Page Generator</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Cover Page Generator</h2>

<div class="form">
  <input id="title" placeholder="Assignment Title">
  <input id="courseName" placeholder="Course Name">
  <input id="courseCode" placeholder="Course Code">

  <input id="studentName" placeholder="Student Name">
  <input id="studentId" placeholder="ID">
  <input id="year" placeholder="Year">
  <input id="term" placeholder="Term">

  <input id="teacherName" placeholder="Teacher Name">
  <input id="designation" placeholder="Designation">

  <input id="department" placeholder="Department Name">

  <button onclick="generate()">Generate</button>
  <button onclick="downloadPDF()">Download PDF</button>
</div>

<div id="preview" class="page">

  <!-- TITLE -->
  <h1 id="pTitle" class="blue">Assignment Title</h1>

  <!-- COURSE -->
  <p><span class="blue">Course Name:</span> <span id="pCourseName"></span></p>
  <p><span class="blue">Course Code:</span> <span id="pCourseCode"></span></p>

  <!-- TABLE -->
  <table>
    <tr class="blue">
      <th>Submitted by</th>
      <th>Submitted to</th>
    </tr>

    <tr>
      <!-- LEFT -->
      <td>
        <p id="pStudentName"></p>
        <p><b>ID:</b> <span id="pStudentId"></span></p>
        <p><b>Year:</b> <span id="pYear"></span></p>
        <p><b>Term:</b> <span id="pTerm"></span></p>

        <p id="pDept1"></p>

        <p>Department of Agriculture</p>
        <p>Noakhali Science and Technology University</p>
        <p>Noakhali-3814, Bangladesh</p>
      </td>

      <!-- RIGHT -->
      <td>
        <p id="pTeacherName"></p>
        <p id="pDesignation"></p>

        <p id="pDept2"></p>

        <p>Noakhali Science and Technology University</p>
        <p>Noakhali-3814, Bangladesh</p>
      </td>
    </tr>
  </table>

</div>

<script src="script.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

</body>
</html>
